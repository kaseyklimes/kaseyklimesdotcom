name: Test Tweet Fetcher

on:
  workflow_dispatch:
    inputs:
      test_username:
        description: 'Twitter username to test with'
        required: true
        type: string

jobs:
  test-fetch:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tweety-ns python-frontmatter python-dateutil

      - name: Run test script
        env:
          TEST_USERNAME: ${{ github.event.inputs.test_username }}
        run: |
          python .github/scripts/test_fetch_tweets.py
          
      - name: Upload test results
        uses: actions/upload-artifact@v3
        with:
          name: test-tweets
          path: test_tweets/
          retention-days: 1 